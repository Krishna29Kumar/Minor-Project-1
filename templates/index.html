<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>InnerVoice</title>
</head>
<body>

    <div class="container">

        <div class="header">
            <div class="logo">📚</div>
            <h1>Welcome to InnerVoice</h1>
            <p class="subtitle">Choose one to continue</p>
        </div>

        <div class="cards-container">
            <a href="{{ url_for('login') }}?type=children" class="card">
                <div class="card-icon">🎓</div>
                <h2>I'm a Children</h2>

                <div style="margin-top: 30px;">
                    <span class="card-button">Continue as Children</span>
                </div>
            </a>

            <a href="{{ url_for('login') }}?type=parent" class="card">
                <div class="card-icon">👨‍👩‍👧‍👦</div>
                <h2>I'm a Parent</h2>

                <div style="margin-top: 30px;">
                    <span class="card-button">Continue as Parent</span>
                </div>
            </a>
        </div>

        <div class="footer">
            <p>
                Need help?
                <a href="#contact">Contact Support</a> |
                <a href="#about">About Us</a>
            </p>
        </div>

    </div>

</body>
</html>
